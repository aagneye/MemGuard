version: "3.9"

# Production overrides — merge with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    volumes: []

  frontend:
    command: ["sh", "-c", "npm run build && npm start -- --hostname 0.0.0.0 --port 3000"]
    restart: unless-stopped
    volumes: []

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/memguard.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
